# This config is used by kebab to figure out how to render glyphs correctly.
# This file name must stay unchanged (map.toml) to be recognized by the font system.
#
# [info] contains font info.
# name: string (The name of the font. "sheet.bmp" is the recommended name)
# map: string (The image your glyphs are stored in)
# line_height: integer (Line height measured in pixels)
#
# [glyphs] contains glyph definitions.
# this format is expected:
# glyph = [ [posX, posY], [sizeX, sizeY], advance ]
# glyph is a string, posX, posY, sizeX, sizeY are vectors and expect integers,
# and advance is an integer.
#
# Generated by scripts/helpers/export_to_map.py.
# Per row = 19, Grid width = 18, Grid height = 18

